pipeline:
  name: "high_fidelity"
  log_level: "DEBUG"
  parallel_stages: false
  mpi_np: 4

electromagnetic:
  solver_type: "magnetoquasistatic_2d"
  nonlinear:
    enabled: true
    max_iterations: 50
    tolerance: 1.0e-8
    relaxation: 0.6
  time_stepping:
    enabled: true
    periods: 3
    steps_per_period: 72
  loss_model: "steinmetz"
  materials:
    temperature_dependent: true    # Coupled EM-thermal iteration

thermal:
  analysis_type: "steady_state"
  cooling:
    type: "water_jacket"
    coolant_temperature_K: 313.15
    h_outer: 1000.0                # Higher convection for forced cooling
    h_endturn: 150.0
    contact_resistance: 5.0e-5
  insulation:
    class: "H"
    max_temperature_K: 453.15      # 180 °C class H
  anisotropy:
    k_in_plane: 28.0
    k_through_plane: 1.0
  convergence_tolerance: 1.0e-10

structural:
  reference_temperature_K: 293.15
  electromagnetic_loads: true
  thermal_loads: true
  materials:
    stator_core:
      youngs_modulus_Pa: 2.0e11
      poisson_ratio: 0.28
      density_kg_m3: 7650
      thermal_expansion_1_K: 12.0e-6
      yield_strength_Pa: 3.5e8
      ultimate_strength_Pa: 5.0e8
      fatigue_limit_Pa: 2.0e8
    winding_equivalent:
      youngs_modulus_Pa: 3.0e9
      poisson_ratio: 0.35
      density_kg_m3: 3500
      thermal_expansion_1_K: 18.0e-6
  fatigue:
    method: "goodman"
    stress_concentration_factor: 2.0
    surface_finish_factor: 0.80
    reliability_factor: 0.814      # 99% reliability
  modal:
    enabled: true
    num_modes: 10
    frequency_range_Hz: [0, 10000]

output:
  format: "json"
  write_fields: true
  compression: true
