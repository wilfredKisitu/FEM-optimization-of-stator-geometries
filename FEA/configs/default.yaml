pipeline:
  name: "default"
  log_level: "INFO"
  parallel_stages: false
  mpi_np: 1

electromagnetic:
  solver_type: "magnetoquasistatic_2d"
  nonlinear:
    enabled: true
    max_iterations: 20
    tolerance: 1.0e-5
    relaxation: 0.7
  time_stepping:
    enabled: false
    periods: 3
    steps_per_period: 72
  rotor_position_deg: 0.0
  rotor_sweep:
    enabled: false
    start_deg: 0.0
    end_deg: 30.0
    steps: 60
  loss_model: "steinmetz"
  materials:
    temperature_dependent: false

thermal:
  analysis_type: "steady_state"
  cooling:
    type: "water_jacket"
    coolant_temperature_K: 313.15   # 40 °C
    h_outer: 500.0                  # W/(m²·K)
    h_endturn: 80.0
    contact_resistance: 1.0e-4      # m²·K/W
  insulation:
    class: "F"
    max_temperature_K: 428.15       # 155 °C
  anisotropy:
    lamination_direction: "z"
    k_in_plane: 28.0                # W/(m·K) — silicon steel
    k_through_plane: 1.0            # W/(m·K) — through lamination stack
  convergence_tolerance: 1.0e-8

structural:
  reference_temperature_K: 293.15   # 20 °C stress-free
  electromagnetic_loads: true
  thermal_loads: true
  materials:
    stator_core:
      youngs_modulus_Pa: 2.0e11
      poisson_ratio: 0.28
      density_kg_m3: 7650
      thermal_expansion_1_K: 12.0e-6
      yield_strength_Pa: 3.5e8
      ultimate_strength_Pa: 5.0e8
      fatigue_limit_Pa: 2.0e8
    winding_equivalent:
      youngs_modulus_Pa: 3.0e9
      poisson_ratio: 0.35
      density_kg_m3: 3500
      thermal_expansion_1_K: 18.0e-6
  fatigue:
    method: "goodman"
    stress_concentration_factor: 1.5
    surface_finish_factor: 0.85
    reliability_factor: 0.897
  modal:
    enabled: true
    num_modes: 6
    frequency_range_Hz: [0, 5000]

output:
  format: "json"
  write_fields: true
  compression: false
