pipeline:
  name: "fast_sweep"
  log_level: "WARNING"
  parallel_stages: false
  mpi_np: 1

electromagnetic:
  solver_type: "magnetoquasistatic_2d"
  nonlinear:
    enabled: false               # Linear reluctivity — fastest
    max_iterations: 1
    tolerance: 1.0e-3
  loss_model: "steinmetz"
  materials:
    temperature_dependent: false

thermal:
  analysis_type: "steady_state"
  cooling:
    type: "water_jacket"
    coolant_temperature_K: 313.15
    h_outer: 500.0
    h_endturn: 80.0
    contact_resistance: 1.0e-4
  insulation:
    class: "F"
    max_temperature_K: 428.15
  anisotropy:
    k_in_plane: 28.0
    k_through_plane: 1.0
  convergence_tolerance: 1.0e-6

structural:
  reference_temperature_K: 293.15
  electromagnetic_loads: false   # Skip EM body forces for speed
  thermal_loads: true
  materials:
    stator_core:
      youngs_modulus_Pa: 2.0e11
      poisson_ratio: 0.28
      density_kg_m3: 7650
      thermal_expansion_1_K: 12.0e-6
      yield_strength_Pa: 3.5e8
      ultimate_strength_Pa: 5.0e8
      fatigue_limit_Pa: 2.0e8
    winding_equivalent:
      youngs_modulus_Pa: 3.0e9
      poisson_ratio: 0.35
      density_kg_m3: 3500
      thermal_expansion_1_K: 18.0e-6
  fatigue:
    method: "goodman"
    stress_concentration_factor: 1.5
    surface_finish_factor: 0.85
    reliability_factor: 0.897
  modal:
    enabled: false               # Skip modal analysis for speed

output:
  format: "json"
  write_fields: false            # Scalar metrics only
  compression: false
